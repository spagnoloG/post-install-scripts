# ============================================= #
# Start with defaults from the Sensible plugin  #
# --------------------------------------------- #
# ============================================= #

set  -g base-index      0
setw -g pane-base-index 0


set -g status-keys vi
set -g mode-keys   vi

setw -g aggressive-resize off
setw -g clock-mode-style  24

# Alacritty term support
set -g default-terminal "tmux-256color"
set -sg terminal-overrides ",*:RGB"

# Kitty terminal
#set -ag terminal-overrides ",xterm-kitty:Tc"
#set-option -sa terminal-features ',XXX:RGB'

# Enable vim keys
set-window-option -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r ^ last-window

# open new pane in current dir: https://gist.github.com/william8th/faf23d311fc842be698a1d80737d9631#file-tmux-conf-L4
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'

# Remap prefix to Control + a
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# Set mouse
set -g mouse on

# Increase history size
set-option -g history-limit 10000

# NeoVim
set-option -sg escape-time 10
set-option -g focus-events on

# Colors
set-option -g status-style "bg=#1f1f28,fg=#dcd7ba"
set-option -g message-style "bg=#1f1f28,fg=#dcd7ba"
set-option -g mode-style "bg=#2d4f67,fg=#c8c093,bold"
set-option -g pane-border-style "fg=#2a2a37"
set-option -g pane-active-border-style "fg=#7e9cd8"
set-option -g display-panes-colour "#c0a36e"
set-option -g display-panes-active-colour "#7e9cd8"

# Set status left with session name and hostname
set-option -g status-left '#[bg=#7e9cd8,fg=#1f1f28,bold] #S #[fg=#7e9cd8,bg=#1f1f28]#[default]'

# Set status right with date, user, Wi-Fi, and battery
set -g status-right-length 100
set-option -g status-right '#[fg=#dcd7ba] %Y-%m-%d %H:%M #[fg=#957fb8]#[bg=#957fb8,fg=#1f1f28] #(whoami) #[fg=#1f1f28,bg=#957fb8]#[bg=#2d4f67,fg=#c8c093] #(~/.config/tmux/wifi_status.sh --tmux) #[fg=#2d4f67,bg=#2d4f67]#[bg=#1f1f28,fg=#c0a36e] #(acpi -b | head -n 1 | awk "{gsub(\",\",\"\"); print \$3 \" \" \$4}" | sed "s/Discharging/🔋/;s/Charging/⚡/;s/Full/🔌/") '

# Clock mode colors
set-option -g clock-mode-colour "#7e9cd8"
set-option -g clock-mode-style 24

# Window title colors
setw -g window-status-format ' #I #[fg=#7e9cd8]#W #[fg=#2a2a37]'
setw -g window-status-current-format ' #[fg=#7e9cd8,bg=#1f1f28] #[fg=#1f1f28,bg=#7e9cd8,bold]#I #[fg=#1f1f28,bold]#W #[default]'

# Split pane indicator
setw -g display-panes-colour "#c0a36e"
setw -g display-panes-active-colour "#7e9cd8"

# Status bar refresh interval (in seconds)
set -g status-interval 5

# Ales helped with that ( Do not scroll to botom when selecting text)
#unbind -T copy-mode-vi MouseDragEnd1Pane

# Copy mode with line numbers - replace default copy-mode
bind-key [ run-shell "~/.config/tmux/copy_mode_with_line_numbers.sh"
bind-key C-n run-shell "~/.config/tmux/copy_mode_with_line_numbers.sh"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager
run -b '~/.tmux/plugins/tpm/tpm'

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
